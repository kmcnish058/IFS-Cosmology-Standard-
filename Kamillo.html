<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMILLO | IFS Master Terminal</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --cyan: #00f2ff;
            --silver: #c0c0c0;
            --warning: #ffaa00;
            --fracture: #ff003c;
        }
        body { background: var(--bg); color: var(--silver); font-family: 'Courier New', monospace; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .terminal { border: 1px solid #333; background: var(--panel); padding: 20px; width: 90%; max-width: 480px; border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,1); }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; margin-bottom: 15px; font-size: 0.8rem; }
        .manifold-readout { text-align: center; margin: 20px 0; }
        .big-val { font-size: 4rem; font-weight: bold; color: var(--cyan); line-height: 1; }
        .logic-label { color: #555; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        .data-stream { background: #000; border: 1px solid #222; padding: 10px; font-size: 0.7rem; color: #0f0; height: 60px; overflow: hidden; margin-bottom: 20px; }
        .slider-group { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--cyan); background: #222; }
        .prediction-box { border-top: 1px solid #222; padding-top: 15px; margin-top: 15px; font-size: 0.8rem; }
        #status-alert { display: none; background: rgba(255, 0, 61, 0.2); border: 1px solid var(--fracture); padding: 10px; color: #fff; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <div>IFS NODE: KAMILLO</div>
        <div id="sync-text" style="color:var(--cyan)">● SYNCING...</div>
    </div>

    <div class="data-stream" id="log-feed">
        [SYS] Initializing 58/42 Logic Manifold...<br>
        [SYS] Awaiting USGS/NOAA Handshake...
    </div>

    <div class="manifold-readout">
        <div class="big-val" id="manifold-total">0.00</div>
        <div class="logic-label">Integrated Flow Manifold (µrad)</div>
    </div>

    <div class="slider-group">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888;">
            <span>PRIMARY (58% EXPANSION)</span><span id="p1-val">0.0</span>
        </div>
        <input type="range" id="p1" min="0" max="30" step="0.1" value="7.3">
    </div>

    <div class="slider-group">
        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#888;">
            <span>SECONDARY (42% BUFFER)</span><span id="p2-val">0.0</span>
        </div>
        <input type="range" id="p2" min="0" max="30" step="0.1" value="7.3">
    </div>

    <div class="prediction-box">
        <div id="prediction-text" style="color:var(--warning)">STABILITY INDEX: NOMINAL</div>
        <div id="status-alert">⚠ CRITICAL FRACTURE: THRESHOLD 15.5 EXCEEDED</div>
    </div>
</div>

<script>
    const threshold = 15.5;
    const p1 = document.getElementById('p1');
    const p2 = document.getElementById('p2');
    const totalDisp = document.getElementById('manifold-total');
    const logFeed = document.getElementById('log-feed');
    const alertBox = document.getElementById('status-alert');

    function calculate() {
        const v1 = parseFloat(p1.value);
        const v2 = parseFloat(p2.value);
        document.getElementById('p1-val').innerText = v1.toFixed(1);
        document.getElementById('p2-val').innerText = v2.toFixed(1);

        // IFS Logic: 58% Primary / 42% Secondary
        const total = (v1 * 0.58) + (v2 * 0.42);
        totalDisp.innerText
            = total.
