<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMILLO | LIVE FOUNTAIN PREDICTOR</title>
    <style>
        :root { --bg: #050505; --neon: #00f2ff; --danger: #ff003c; --silver: #c0c0c0; }
        body { background: var(--bg); color: var(--silver); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .monitor { border: 2px solid #222; background: #111; padding: 30px; width: 90%; max-width: 500px; border-radius: 10px; box-shadow: 0 0 50px rgba(0,242,255,0.05); position: relative; }
        .header { display: flex; justify-content: space-between; font-size: 0.7rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; color: var(--neon); }
        .display { text-align: center; margin: 40px 0; }
        .manifold-val { font-size: 5rem; font-weight: bold; color: var(--neon); letter-spacing: -2px; }
        .unit { font-size: 1rem; color: #444; margin-top: -10px; }
        .feed-container { background: #000; padding: 15px; border-radius: 5px; border: 1px solid #222; margin-top: 20px; }
        .feed-line { font-size: 0.75rem; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .label { color: #666; }
        .value { color: #fff; font-weight: bold; }
        #alert { display: none; margin-top: 20px; padding: 15px; background: rgba(255,0,60,0.2); border: 1px solid var(--danger); color: #fff; text-align: center; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="monitor">
    <div class="header">
        <div>STATION: KAMILLO_AUTO</div>
        <div id="status">● SCANNING TELEMETRY</div>
    </div>

    <div class="display">
        <div class="manifold-val" id="total">0.00</div>
        <div class="unit">IFS MANIFOLD (µrad)</div>
    </div>

    <div class="feed-container">
        <div class="feed-line">
            <span class="label">PRIMARY (TILT/SEISMIC 58%):</span>
            <span class="value" id="p1-out">WAITING...</span>
        </div>
        <div class="feed-line">
            <span class="label">SECONDARY (BUFFER 42%):</span>
            <span class="value" id="p2-out">WAITING...</span>
        </div>
        <div class="feed-line">
            <span class="label">KILAUEA STATUS:</span>
            <span class="value" id="volcano-stat">FETCHING...</span>
        </div>
    </div>

    <div id="alert">⚠ FOUNTAINING IMMINENT: THRESHOLD 15.5 BREACHED</div>
</div>

<script>
    const totalDisp = document.getElementById('total');
    const p1Disp = document.getElementById('p1-out');
    const p2Disp = document.getElementById('p2-out');
    const alertBox = document.getElementById('alert');
    const volStat = document.getElementById('volcano-stat');

    async function updateIFS() {
        try {
            // Fetching 24h seismic activity for the Big Island
            const res = await fetch("https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=" + new Date(Date.now() - 86400000).toISOString() + "&minlatitude=19.3&maxlatitude=19.5&minlongitude=-155.4&maxlongitude=-155.2&limit=5");
            const data = await res.json();
            
            let avgMag = 0;
            if (data.features.length > 0) {
                avgMag = data.features.reduce((acc, f) => acc + f.properties.mag, 0) / data.features.length;
            }

            // SIMULATED TILT TIE-IN (Because USGS Tilt APIs often require specialized keys, 
            // we use the Seismic Magnitude as a proxy for magmatic pressure/expansion)
            const primaryVal = avgMag * 6.2; // Scaling Mag to µrad logic
            const secondaryVal = 7.3; // Baseline Buffer (Can be linked to NOAA Swell later)

            // THE 58/42 MASTER LOGIC
            const finalManifold = (primaryVal * 0.58) + (secondaryVal * 0.42);

            // Update UI
            p1Disp.innerText = primaryVal.toFixed(2) + " µrad";
            p2Disp.innerText = secondaryVal.toFixed(2) + " µrad";
            totalDisp.innerText = finalManifold.toFixed(2);
            volStat.innerText = data.features.length > 0 ? "ACTIVITY DETECTED" : "QUIET";

            if (finalManifold >= 15.5) {
                alertBox.style.display = 'block';
                totalDisp.style.color = 'var(--danger)';
            } else {
                alertBox.style.display = 'none';
                totalDisp.style.color = 'var(--neon)';
            }
            
            document.getElementById('status').innerText = "● LIVE SYNC ACTIVE";
        } catch (e) {
            document.getElementById('status').innerText = "● SYNC ERROR: CHECKING CORS";
            volStat.innerText = "OFFLINE";
        }
    }

    // Refresh every 2 minutes
    updateIFS();
    setInterval(updateIFS, 120000);
</script>
