<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMILO | IFS Terminal</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --silver: #c0c0c0;
            --neon: #00f2ff;
            --danger: #ff003c;
        }
        body { 
            background: var(--bg); color: var(--silver); 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0;
        }
        .frame {
            border: 2px solid #333; background: var(--panel);
            padding: 25px; border-radius: 8px;
            width: 90%; max-width: 500px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .sync { color: var(--neon); font-weight: bold; font-size: 0.8rem; }
        .gauge-area { text-align: center; margin: 30px 0; }
        .value { font-size: 3.5rem; color: var(--neon); font-weight: bold; }
        .label { font-size: 0.9rem; color: #666; letter-spacing: 2px; }
        .slider-box { margin: 20px 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--neon); }
        .alert-box { 
            display: none; padding: 15px; border: 2px solid var(--danger); 
            color: white; background: rgba(255, 0, 60, 0.2); 
            text-align: center; font-weight: bold; margin-top: 20px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="frame">
    <div class="header">
        <div>IFS: KAMILO</div>
        <div class="sync" id="syncStat">● NODE SYNCED</div>
    </div>

    <div class="gauge-area">
        <div class="label">TOTAL TILT</div>
        <div class="value" id="totalDisplay">7.30</div>
        <div class="label">µrad</div>
    </div>

    <div class="slider-box">
        <div class="label">PRIMARY SENSOR (58%)</div>
        <input type="range" id="p1" min="0" max="30" step="0.1" value="7.3">
    </div>

    <div class="slider-box">
        <div class="label">SECONDARY SENSOR (42%)</div>
        <input type="range" id="p2" min="0" max="30" step="0.1" value="7.3">
    </div>

    <div id="alert" class="alert-box">
        ⚠ CRITICAL BREACH ⚠<br>
        INITIATE SAFE-PATH: KONA BYPASS
    </div>
</div>

<script>
    const p1 = document.getElementById('p1');
    const p2 = document.getElementById('p2');
    const display = document.getElementById('totalDisplay');
    const alertBox = document.getElementById('alert');
    const sync = document.getElementById('syncStat');

    function calculate() {
        const total = (p1.value * 0.58) + (p2.value * 0.42);
        display.innerText = total.toFixed(2);
        
        if (total >= 15.5) {
            alertBox.style.display = 'block';
            display.style.color = 'var(--danger)';
            sync.style.color = 'var(--danger)';
            sync.innerText = '● MANIFOLD FRACTURE';
        } else {
            alertBox.style.display = 'none';
            display.style.color = 'var(--neon)';
            sync.style.color = 'var(--neon)';
            sync.innerText = '● NODE SYNCED';
        }
    }

    p1.addEventListener('input', calculate);
    p2.addEventListener('input', calculate);
</script>

</body>
</html>
