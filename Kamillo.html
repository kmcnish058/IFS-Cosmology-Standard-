<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAMILLO | ARCHITECT RICK EDITION</title>
    <style>
        :root {
            --lava: #ff4500;
            --neon: #00f2ff;
            --rock: #1a1a1a;
            --glass: rgba(15, 15, 15, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Courier New', monospace;
            overflow: hidden; color: #fff;
        }

        /* DYNAMIC VOLCANO BACKGROUND */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at bottom, #4b0000 0%, #000 70%);
            z-index: -2;
        }

        /* DATA STREAM PARTICLES */
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .border-frame {
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(255, 69, 0, 0.3);
            pointer-events: none; border-radius: 15px;
        }

        .terminal-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 40px; border-radius: 20px;
            width: 85%; max-width: 500px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            text-align: center;
        }

        .manifold-value {
            font-size: 6rem; font-weight: bold;
            background: linear-gradient(to bottom, var(--neon), #0077ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0,242,255,0.3);
            margin: 10px 0;
        }

        .glyph-btn {
            background: #1a1a1a;
            border: 2px solid #333;
            color: var(--lava);
            padding: 15px 30px;
            margin: 20px 5px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1.2rem;
            box-shadow: inset 0 0 10px #000, 0 4px #000;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .glyph-btn:active { transform: translateY(4px); box-shadow: 0 0px #000; }

        .stat-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-top: 20px; font-size: 0.7rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 5px;
            border-left: 3px solid var(--lava);
        }

        .alert-active {
            color: var(--lava); font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-layer"></div>
<canvas id="particle-canvas"></canvas>
<div class="border-frame"></div>

<div class="terminal-container">
    <div class="glass-panel">
        <div style="font-size: 0.6rem; letter-spacing: 5px; color: var(--neon);">IFS ARCHITECT: RICK</div>
        
        <div class="manifold-value" id="total">0.00</div>
        <div style="font-size: 0.8rem; color: #666; letter-spacing: 3px;">INTEGRATED FLOW (µrad)</div>

        <div class="stat-grid">
            <div class="stat-card">
                <div style="color: #444;">INTERNAL 58%</div>
                <div id="p1-out" style="color: var(--neon);">--</div>
            </div>
            <div class="stat-card">
                <div style="color: #444;">AETHER 42%</div>
                <div id="p2-out" style="color: var(--lava);">--</div>
            </div>
        </div>

        <div id="prediction" style="margin-top: 25px; font-size: 0.9rem;">
            STATUS: <span id="status-text" style="color: #0f0;">STABLE_NODE</span>
        </div>

        <div>
            <button class="glyph-btn" onclick="sync()">᚛ᚃᚒ᚜</button>
            <button class="glyph-btn" onclick="alert('Threshold: 15.5 | May 2 Window Active')">𓊝</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    // Particle System (Data Embers)
    function initParticles() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                v: Math.random() * 0.5 + 0.2,
                size: Math.random() * 2
            });
        }
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 69, 0, 0.5)";
        particles.forEach(p => {
            p.y -= p.v;
            if(p.y < 0) p.y = canvas.height;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    // IFS Logic Sync
    async function sync() {
        try {
            const res = await fetch("https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=" + new Date(Date.now() - 86400000).toISOString() + "&minlatitude=19.3&maxlatitude=19.5&minlongitude=-155.4&maxlongitude=-155.2&limit=1");
            const data = await res.json();
            const mag = data.features.length > 0 ? data.features[0].properties.mag : 1.2;
            
            const solarRes = await fetch("https://services.swpc.noaa.gov/json/planetary-k-index-latest.json");
            const solarData = await solarRes.json();
            const kp = parseFloat(solarData[0].kp_index);

            const p1 = mag * 5.8;
            const p2 = kp * 1.5 + 4.0;
            const manifold = (p1 * 0.58) + (p2 * 0.42);

            document.getElementById('total').innerText = manifold.toFixed(2);
            document.getElementById('p1-out').innerText = p1.toFixed(2);
            document.getElementById('p2-out').innerText = p2.toFixed(2);

            if(manifold >= 15.5) {
                document.getElementById('status-text').innerText = "FRACTURE_IMMINENT";
                document.getElementById('status-text').className = "alert-active";
            } else {
                document.getElementById('status-text').innerText = "NOMINAL_SYNC";
                document.getElementById('status-text').className = "";
            }
        } catch(e) { console.log("Sync Interrupted"); }
    }

    window.addEventListener('resize', initParticles);
    initParticles();
    animate();
    sync();
    setInterval(sync, 300000);
</script>

</body>
</html>
